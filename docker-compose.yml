# emrys — persistent agent memory
#
# Usage:
#   docker compose up -d        # Start emrys MCP server
#   docker compose exec emrys emrys search "query"  # Search
#   docker compose down         # Stop
#
# First-time setup:
#   docker compose run emrys init --sovereign --mode tool --dir /agent/.persist

services:
  emrys:
    build: .
    container_name: emrys
    volumes:
      - emrys-data:/agent/.persist
    stdin_open: true   # Required for MCP stdio transport
    restart: unless-stopped

volumes:
  emrys-data:
